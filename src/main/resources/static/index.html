<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodic Idle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: system-ui, sans-serif;
        background: #0a0a0f;
        color: #e0e0e0;
        display: flex;
        height: 100vh;
    }

    /* Сайдбар */
    .sidebar {
        width: 200px;
        background: #111118;
        border-right: 1px solid #1e1e2a;
        padding: 16px 0;
        display: flex;
        flex-direction: column;
    }
    .sidebar-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #555;
        padding: 8px 16px 4px;
    }
    .sidebar-item {
        padding: 10px 16px;
        font-size: 14px;
        cursor: pointer;
        color: #888;
        border-left: 2px solid transparent;
    }
    .sidebar-item:hover { color: #ccc; background: #16161f; }
    .sidebar-item.active {
        color: #7dd3fc;
        border-left-color: #7dd3fc;
        background: #0c1a2a;
    }
    .sidebar-item.locked {
        color: #333;
        cursor: not-allowed;
    }

    /* Основна панель */
    .main {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
    }

    /* Ресурси зверху */
    .resources-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
    }
    .res-card {
        background: #111118;
        border: 1px solid #1e1e2a;
        border-radius: 8px;
        padding: 12px 16px;
        min-width: 140px;
    }
    .res-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
        margin-bottom: 4px;
    }
    .res-value {
        font-size: 22px;
        font-variant-numeric: tabular-nums;
        color: #7dd3fc;
    }
    .res-rate {
        font-size: 11px;
        color: #4a9;
        margin-top: 2px;
    }

    /* Панелі контенту */
    .panel {
        background: #111118;
        border: 1px solid #1e1e2a;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
    }
    .panel-title {
        font-size: 13px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
    }
    .gen-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #1a1a24;
    }
    .gen-row:last-child { border-bottom: none; }
    .gen-name { font-size: 14px; color: #ddd; }
    .gen-info { font-size: 12px; color: #666; margin-top: 2px; }
    .gen-btn {
        background: #0c1a2a;
        border: 1px solid #1e3a5a;
        color: #7dd3fc;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
    }
    .gen-btn:hover { background: #132a42; border-color: #2a5a8a; }
    .gen-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-title">Виробництво</div>
  <div class="sidebar-item active" onclick="showPage('generators')">Генератори</div>
  <div class="sidebar-item locked">Обмін</div>
  <div class="sidebar-item locked">Синтез</div>

  <div class="sidebar-title" style="margin-top: 16px">Прогресія</div>
  <div class="sidebar-item locked">Апгрейди</div>
  <div class="sidebar-item locked">Досягнення</div>
  <div class="sidebar-item locked">Престиж</div>

  <div class="sidebar-title" style="margin-top: 16px">Мета</div>
  <div class="sidebar-item" onclick="showPage('stats')">Статистика</div>
</div>

<div class="main">
  <div class="resources-bar" id="resources-bar"></div>

  <div id="page-generators" class="page active">
    <div class="panel">
      <div class="panel-title">Генератори енергії</div>
      <div id="generators-list"></div>
    </div>
  </div>

  <div id="page-stats" class="page">
    <div class="panel">
      <div class="panel-title">Статистика</div>
      <div id="stats-content" style="color: #666; font-size: 13px;">
        Тік працює щосекунди на сервері.
      </div>
    </div>
  </div>
</div>

<script>
  const SAVE_ID = 1;
  let prevResources = {};

  function formatBigNum(number, exponent) {
      if (number === 0) return "0";
      if (exponent <= 2 && exponent >= 0) {
          return (number * Math.pow(10, exponent)).toFixed(1);
      }
      return number.toFixed(2) + "e" + exponent;
  }

  function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      event.target.classList.add('active');
  }

  async function fetchState() {
      const res = await fetch('/api/state/' + SAVE_ID);
      const data = await res.json();

      const bar = document.getElementById('resources-bar');
      bar.innerHTML = data.map(r => {
          const prev = prevResources[r.resource] || { number: r.number, exponent: r.exponent };
          const curr = r.number * Math.pow(10, r.exponent);
          const old = prev.number * Math.pow(10, prev.exponent);
          const rate = curr - old;

          prevResources[r.resource] = { number: r.number, exponent: r.exponent };

          return `<div class="res-card">
              <div class="res-label">${r.resource}</div>
              <div class="res-value">${formatBigNum(r.number, r.exponent)}</div>
              <div class="res-rate">${rate >= 0 ? '+' : ''}${rate.toFixed(1)}/с</div>
          </div>`;
      }).join('');
  }

  fetchState();
  setInterval(fetchState, 1000);
</script>
</body>
</html>
